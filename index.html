<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>Token is Money</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container { text-align: center; padding: 40px; }
    h1 { color: white; font-size: 2.5rem; margin-bottom: 30px; }
    .link-btn {
      display: inline-block;
      padding: 18px 48px;
      background: white;

      font-size: 1.25rem;
      font-weight: 600;
      border-radius: 50px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .link-btn:hover { transform: translateY(-3px); }

</head>
<body>
  <div class="container">
    <h1>🔗 Token is Money</h1>
    <a href="https://tokenismoney.com" target="_blank" class="link-btn">访问 tokenismoney.com</a>
